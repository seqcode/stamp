services:
  app:
    build:
      context: ../..
      dockerfile: web/docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/stamp
      - REDIS_URL=redis://redis:6379
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - STAMP_BINARY=/app/stamp
      - SCORE_DISTS_DIR=/app/ScoreDists
      - JOBS_DATA_DIR=/app/data/jobs
      - NODE_ENV=production
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@stamp.example.com}
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:3000}
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - job-data:/app/data/jobs
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: web/docker/Dockerfile.worker
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/stamp
      - REDIS_URL=redis://redis:6379
      - STAMP_BINARY=/app/stamp
      - SCORE_DISTS_DIR=/app/ScoreDists
      - JOBS_DATA_DIR=/app/data/jobs
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@stamp.example.com}
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:3000}
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - job-data:/app/data/jobs
    deploy:
      replicas: 2
    restart: unless-stopped

  mongodb:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data:
  job-data:
